<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯繫我們</title>
</head>
<body style="font-family: sans-serif; background-color: #f9f9f9; text-align: center; padding: 40px 20px;">

    <img src="avatar.jpg" alt="我的頭像" style="width: 120px; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    
    <h2 style="margin-top: 20px;">請掃描下方二維碼添加我的企業微信</h2>
    
    <div style="margin-top: 30px;">
        <img src="qrcode.jpg" alt="企業微信二維碼" style="width: 280px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    </div>
    
    <p style="color: #777; margin-top: 20px; font-size: 14px;">
        長按二維碼，點擊「識別圖中二維碼」即可與我直接聯繫
    </p>

</body>
</html>
